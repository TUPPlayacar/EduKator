<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>EduKator - Sistema de Evaluación Heurística STAR</title>
  
  <link rel="icon" type="image/png" href="ico.png">

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    @media print {
      body { background-color: #ffffff !important; color: #000000 !important; }
      header, footer, .no-print, button { display: none !important; }
      #app-container { box-shadow: none !important; border: none !important; padding: 0 !important; width: 100% !important; max-width: 100% !important; }
      .print-area { width: 100% !important; padding: 0 !important; margin: 0 !important; }
    }
    
    .competencia-card {
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .competencia-card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.25);
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen flex flex-col">

  <!-- Navbar -->
  <header class="bg-slate-900 text-white shadow-md">
    <div class="max-w-4xl mx-auto px-4 py-4 flex justify-between items-center">
      <div class="flex items-center space-x-3">
        <img src="ico.png" alt="EduKator Logo" class="w-8 h-8 object-contain">
        <div>
          <h1 class="text-base font-bold tracking-tight">EduKator</h1>
          <p class="text-[10px] text-slate-400">Sistema de Evaluación y Reclutamiento • SIESTAR</p>
        </div>
      </div>
      <div class="text-[10px] bg-indigo-950 px-3 py-1.5 rounded-full text-indigo-300 font-mono border border-indigo-900/40">
        Vectores Semánticos Activos
      </div>
    </div>
  </header>

  <!-- Contenedor Dinámico -->
  <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:py-6">
    <div id="app-container" class="bg-white rounded-2xl shadow-xl border border-slate-200 p-5 md:p-6 transition-all">
      <!-- Inyección vía js/app.js -->
    </div>
  </main>

  <!-- Footer -->
  <footer class="bg-slate-100 border-t border-slate-200 py-3 text-center text-[15px] text-slate-400">
    &copy; 2026 Edukator • Módulo Institucional de Reclutamiento por Competencias (Análisis Matricial Avanzado).
  </footer>

  <!-- Scripts -->
  <script src="js/competencias.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
